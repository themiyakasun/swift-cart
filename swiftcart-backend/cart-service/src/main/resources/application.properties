server.port=8085

spring.application.name=cart-service

# --- Database Configuration ---
spring.datasource.url=jdbc:mysql://localhost:3306/swiftcart_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Hibernate Settings ---
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# Tell it where the Eureka Server lives
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# Standard setting to fetch the registry
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

api.prefix=/api/v1